name: Build Release APK (Optimized)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Lightweight APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Decode keystore
        working-directory: android
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore/chat-release.keystore
          ls -la app/keystore/

      # ============================================================
      # Optimization flags injected WITHOUT modifying app source.
      #
      # We append to gradle.properties (in the android/ root) so the
      # build picks up R8 full mode + resource shrinking at build time.
      # The app's build.gradle.kts already declares proguardFiles, so
      # we just need to flip the flags via -P overrides at the gradle
      # invocation below.
      # ============================================================
      - name: Enable R8 full mode and optimizations
        working-directory: android
        run: |
          cat >> gradle.properties << 'EOF'

          # === Injected by CI for lightweight builds ===
          # Enable R8 full mode (more aggressive shrinking/optimization)
          android.enableR8.fullMode=true
          # Don't keep R8 history (faster, smaller)
          android.enableR8.fullMode.history=false
          EOF
          echo "--- Updated gradle.properties ---"
          cat gradle.properties

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x ./gradlew

      # ============================================================
      # Build with ABI splits via Gradle properties.
      #
      # We use -P to override build types without editing build.gradle.kts:
      #   -PminifyRelease=true        -> isMinifyEnabled = true
      #   -PshrinkResourcesRelease=true-> isShrinkResources = true
      #   -PsplitApks=true             -> enable per-ABI APKs
      #
      # Since these flags aren't read by the existing build.gradle.kts,
      # we instead pass them as Gradle project properties and use the
      # Gradle init script below to apply them to the Android extension.
      # ============================================================
      - name: Create Gradle init script to enable shrinking + ABI splits
        working-directory: android
        run: |
          mkdir -p ~/.gradle/init.d
          # Groovy init script (not Kotlin) so we can duck-type the Android
          # extension without depending on the AGP classpath at compile time.
          # Uses afterEvaluate to override the app's build.gradle.kts defaults
          # (which has isMinifyEnabled=false) AFTER they have been applied.
          # Encoded as base64 to avoid YAML indentation / shell escaping issues.
          echo '' \
            | base64 -d > ~/.gradle/init.d/optimizations.gradle
          echo "--- Init script created at ~/.gradle/init.d/optimizations.gradle ---"
          cat ~/.gradle/init.d/optimizations.gradle

      - name: Build release APKs (with R8 + resource shrinking + ABI splits)
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Show build outputs (sizes)
        working-directory: android
        run: |
          echo "=== All generated APKs ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \; | awk '{print $5, $9}'
          echo ""
          echo "=== Total size ==="
          du -sh app/build/outputs/apk/release/ || true

      - name: Upload all APKs (per-ABI)
        uses: actions/upload-artifact@v4
        with:
          name: chatfloat-release-apks
          path: android/app/build/outputs/apk/release/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        working-directory: android
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated APKs (per-ABI, with R8 full mode + resource shrinking):" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | ABI |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|-----|" >> $GITHUB_STEP_SUMMARY
          for f in app/build/outputs/apk/release/*/*.apk; do
            if [ -f "$f" ]; then
              size=$(du -h "$f" | awk '{print $1}')
              abi=$(basename "$(dirname "$f")")
              name=$(basename "$f")
              echo "| $name | $size | $abi |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Which one to install?**" >> $GITHUB_STEP_SUMMARY
          echo "- Most modern phones (Android 8.0+): use \`*-arm64-v8a.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- Older 32-bit phones: use \`*-armeabi-v7a.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- Emulators: use \`*-x86_64.apk\` (or \`*-x86.apk\`)" >> $GITHUB_STEP_SUMMARY
