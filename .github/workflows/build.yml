name: Build Release APK (arm64-v8a, with Go backend)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973'

      - name: Decode keystore
        working-directory: android
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore/chat-release.keystore
          ls -la app/keystore/

      # ============================================================
      # 1. Run Go unit tests (no network needed)
      # ============================================================
      - name: Go unit tests
        working-directory: go
        run: |
          go test -v ./...

      # ============================================================
      # 2. Build the Go shared library (.so) for arm64-v8a.
      #    This produces libchatfloat.so + libchatfloat.h.
      #    We use go build -buildmode=c-shared (NOT gomobile) so we
      #    have full Go capabilities including the standard library
      #    and any third-party Go module.
      # ============================================================
      - name: Build Go shared library for arm64-v8a
        working-directory: go
        env:
          NDK_TOOLCHAIN: /usr/local/lib/android/sdk/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/bin
          NDK_SYSROOT: /usr/local/lib/android/sdk/ndk/27.0.12077973/sysroot
        run: |
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          GOOS=android \
          GOARCH=arm64 \
          CGO_ENABLED=1 \
          CC=$NDK_TOOLCHAIN/aarch64-linux-android24-clang \
          CGO_CFLAGS="-I$NDK_SYSROOT/usr/include --target=aarch64-linux-android24" \
          CGO_LDFLAGS="--target=aarch64-linux-android24 -shared" \
          go build \
            -tags jni \
            -buildmode=c-shared \
            -o ../android/app/src/main/jniLibs/arm64-v8a/libchatfloat.so \
            ./chatfloat
          ls -la ../android/app/src/main/jniLibs/arm64-v8a/

      # ============================================================
      # 3. Build the APK (arm64-v8a only, no minification)
      # ============================================================
      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatfloat-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Show build outputs
        working-directory: android
        run: |
          ls -la app/build/outputs/apk/release/ || true
          echo "=== APK info ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
